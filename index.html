<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>En & Sky Travel Journal</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --bg-2: #e9dfd0;
      --panel: rgba(255, 255, 255, 0.8);
      --ink: #1f1a14;
      --muted: #6c5b4f;
      --line: rgba(48, 33, 20, 0.16);
      --accent: #9c4a21;
      --accent-2: #1e5f6a;
      --radius-lg: 24px;
      --radius-md: 16px;
      --shadow: 0 20px 48px rgba(56, 34, 16, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      font-family: "Avenir Next", "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.58), transparent 28%),
        radial-gradient(circle at 90% 85%, rgba(30, 95, 106, 0.2), transparent 28%),
        linear-gradient(135deg, var(--bg), var(--bg-2));
    }

    .shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 36px;
    }

    .hero {
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .eyebrow {
      margin: 0;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 10px 0 8px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.2rem, 5.2vw, 3.8rem);
      line-height: 1;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 100%;
      text-wrap: pretty;
    }

    .lead-break {
      display: none;
    }

    .grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.74);
      padding: 16px;
    }

    .card h2 {
      margin: 2px 0 8px;
      font-size: 1.4rem;
    }

    .meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.55;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      font-weight: 700;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .btn-main {
      background: linear-gradient(135deg, var(--accent), #c06a36);
      color: #fff;
      box-shadow: 0 10px 24px rgba(156, 74, 33, 0.25);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (min-width: 900px) {
      .lead-break {
        display: block;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">En & Sky</p>
      <h1>En & Sky Travel Journal</h1>
      <p class="lead">歡迎來到 En & Sky 的旅行紀錄主頁。這裡整理了每次旅程的路線與重點，<br class="lead-break">方便親友或新訪客快速瀏覽與參考。</p>

      <section class="grid" aria-label="project entries">
        <article class="card">
          <h2>2025 Korea</h2>
          <p class="meta">日期：9/15 - 9/19</p>
          <p class="meta">韓國 5 天行程，包含每日路線、花費統整與地區總覽。</p>
          <div class="actions">
            <a class="btn btn-main" href="Korea/index.html">查看 2025 Korea 行程</a>
          </div>
        </article>

        <article class="card">
          <h2>2026 HK</h2>
          <p class="meta">日期：3/22 - 3/26</p>
          <p class="meta">香港 5 天行程頁面，包含每日安排與重點景點內容。</p>
          <div class="actions">
            <a class="btn btn-main" href="HK/index.html">查看 2026 HK 行程</a>
          </div>
        </article>
      </section>
    </section>
  </main>
</body>
</html>
